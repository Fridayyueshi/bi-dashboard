<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品定价 · BI-OS</title>
  <style>
    :root {
      --bg-dark: #0d1117;
      --bg-card: #1a2028;
      --bg-card-hover: #222a36;
      --border: #2d3543;
      --text-primary: #e6edf3;
      --text-muted: #8b949e;
      --accent-cyan: #58a6ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      opacity: 0.6;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      color: var(--text-muted);
      font-size: 14px;
    }
    .back-btn {
      display: inline-block;
      margin-top: 32px;
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-cyan);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">💲</div>
    <h1>商品定价功能开发中</h1>
    <p>敬请期待</p>
    <a class="back-btn" href="/">← 返回</a>
  </div>
</body>
</html>
